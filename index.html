<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Sistema Personal</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial, sans-serif; background: #f3f4f6; padding: 20px; max-width: 500px; margin:auto;}
h1 { text-align:center; }
.card { background:white; padding:15px; border-radius:15px; margin-bottom:15px; box-shadow:0 4px 10px rgba(0,0,0,0.05);}
button { border:none; padding:6px 10px; border-radius:8px; cursor:pointer; background:#111827; color:white;}
input { padding:6px; border-radius:8px; border:1px solid #ddd; width:70%;}
.row { display:flex; justify-content:space-between; align-items:center; margin-top:8px;}
.done { text-decoration:line-through; opacity:0.5;}
.streak, .level-bar, .rank-display { text-align:center; font-size:18px; margin-bottom:15px;}
.progress-bar { width:100%; background:#ddd; border-radius:10px; height:20px; overflow:hidden; }
.progress-bar-inner { height:100%; background:#111827; width:0%; transition: width 0.3s;}
</style>
</head>
<body>

<h1>Mi Sistema Personal 🚀</h1>
<div class="streak">🔥 Racha: <span id="streak">0</span> días</div>
<div class="level-bar">⭐ Nivel: <span id="level">1</span> | XP: <span id="xp">0</span>/100
  <div class="progress-bar"><div class="progress-bar-inner" id="xpBar"></div></div>
</div>
<div class="rank-display">🏅 Rango: <span id="rank">Recluta</span></div>

<div class="card">
<h3>Hábitos diarios</h3>
<input id="newHabit" placeholder="Nuevo hábito...">
<button onclick="addHabit()">+</button>
<div id="habits"></div>
<p>Progreso: <span id="progress">0</span>%</p>
</div>

<div class="card">
<h3>Tareas del día</h3>
<input id="newTask" placeholder="Nueva tarea...">
<button onclick="addTask()">+</button>
<div id="tasks"></div>
</div>

<div class="card">
<h3>Modo Enfoque (25 min)</h3>
<p id="timer">25:00</p>
<button onclick="startTimer()">Iniciar</button>
<button onclick="pauseTimer()">Pausar</button>
<button onclick="resetTimer()">Reset</button>
</div>

<div class="card">
<h3>Progreso</h3>
<canvas id="chart"></canvas>
</div>

<button onclick="closeDay()">Cerrar Día y Guardar</button>

<script>
// --- VARIABLES ---
let habits = JSON.parse(localStorage.getItem("habits")) || [];
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let history = JSON.parse(localStorage.getItem("history")) || [];
let streak = JSON.parse(localStorage.getItem("streak")) || 0;
let lastCompletedDate = localStorage.getItem("lastCompletedDate") || null;
let xp = JSON.parse(localStorage.getItem("xp")) || 0;
let level = JSON.parse(localStorage.getItem("level")) || 1;
let rank = "Recluta";
let time = 1500; // 25 min
let interval;

// --- FUNCIONES ---
function save(){
  localStorage.setItem("habits", JSON.stringify(habits));
  localStorage.setItem("tasks", JSON.stringify(tasks));
  localStorage.setItem("history", JSON.stringify(history));
  localStorage.setItem("streak", JSON.stringify(streak));
  localStorage.setItem("lastCompletedDate", lastCompletedDate);
  localStorage.setItem("xp", JSON.stringify(xp));
  localStorage.setItem("level", JSON.stringify(level));
}

function render(){
  document.getElementById("streak").innerText = streak;
  document.getElementById("level").innerText = level;
  document.getElementById("xp").innerText = xp;
  document.getElementById("xpBar").style.width = (xp) + "%";
  updateRankDisplay();

  // Render hábitos
  const habitsDiv = document.getElementById("habits");
  habitsDiv.innerHTML = "";
  habits.forEach((h,i)=>{ habitsDiv.innerHTML += `<div class="row"><span class="${h.done?'done':''}">${h.text}</span><div><button onclick="toggleHabit(${i})">✔</button><button onclick="deleteHabit(${i})">X</button></div></div>` });

  // Render tareas
  const tasksDiv = document.getElementById("tasks");
  tasksDiv.innerHTML = "";
  tasks.forEach((t,i)=>{ tasksDiv.innerHTML += `<div class="row"><span class="${t.done?'done':''}">${t.text}</span><button onclick="toggleTask(${i})">✔</button></div>` });

  updateProgress();
}

function updateRankDisplay(){
  if(level<=2) rank="Recluta";
  else if(level<=5) rank="Constante";
  else if(level<=9) rank="Disciplinado";
  else if(level<=19) rank="Imparable";
  else rank="Élite";
  document.getElementById("rank").innerText = rank;
}

function updateProgress(){
  if(habits.length===0){ document.getElementById("progress").innerText=0; return;}
  const done = habits.filter(h=>h.done).length;
  const percent = Math.round((done/habits.length)*100);
  document.getElementById("progress").innerText = percent;
}

function addHabit(){ const input=document.getElementById("newHabit"); if(!input.value)return; habits.push({text:input.value,done:false}); input.value=""; save(); render();}
function deleteHabit(i){ habits.splice(i,1); save(); render();}
function toggleHabit(i){ habits[i].done=!habits[i].done; save(); render();}

function addTask(){ const input=document.getElementById("newTask"); if(!input.value)return; tasks.push({text:input.value,done:false}); input.value=""; save(); render();}
function toggleTask(i){ tasks[i].done=!tasks[i].done; save(); render();}

// --- TIMER ---
function startTimer(){ if(interval)return; interval=setInterval(()=>{ if(time>0){ time--; updateTimer(); } },1000);}
function pauseTimer(){ clearInterval(interval); interval=null;}
function resetTimer(){ pauseTimer(); time=1500; updateTimer();}
function updateTimer(){ const min=Math.floor(time/60); const sec=time%60; document.getElementById("timer").innerText=min+":"+(sec<10?"0":"")+sec;}

// --- CERRAR DÍA ---
function closeDay(){
  const done = habits.filter(h=>h.done).length;
  const percent = habits.length===0?0:Math.round((done/habits.length)*100);
  const todayDate = new Date();
  const todayStr = todayDate.toDateString();
  history.push({date:todayStr,score:percent});

  // --- RACHA ---
  if(percent>=70){
    if(lastCompletedDate){
      const lastDate=new Date(lastCompletedDate);
      const diffDays=(todayDate-lastDate)/(1000*60*60*24);
      streak=(diffDays===1)?streak+1:1;
    }else{streak=1;}
    lastCompletedDate=todayStr;
  }else{ streak=0; lastCompletedDate=null;}

  // --- XP & LEVEL ---
  let earnedXP=0;
  if(percent>=70 && percent<80) earnedXP=10;
  else if(percent>=80 && percent<90) earnedXP=20;
  else if(percent>=90) earnedXP=30;
  if(streak>0) earnedXP=Math.floor(earnedXP*1.2);
  xp+=earnedXP;
  if(xp>=100){ xp=xp-100; level++; alert("🎉 SUBISTE A NIVEL "+level); }

  habits.forEach(h=>h.done=false); tasks=[];
  save(); render(); updateChart();
}

// --- GRÁFICO ---
function updateChart(){
  const ctx=document.getElementById("chart");
  new Chart(ctx,{type:"line",data:{labels:history.map(h=>h.date),datasets:[{label:"Progreso %",data:history.map(h=>h.score),borderWidth:3}]},options:{scales:{y:{min:0,max:100}}}});
}

render(); updateChart(); updateTimer();
</script>

</body>
</html>
